name: mac26-test

# macOS 26 (Tahoe) 진단 — 최종 확정 실험. 수동 실행 전용, 배포와 무관.
# 확정 사실: 원본 linker 서명 유지 = ALIVE / 서명 교체(재서명·lipo·electron-builder 서명) = DEAD.
# 이번 런: (X1) 재서명만으로 죽는지 단일변수 증명, (X2) 엔타이틀먼트로 구제 가능한지,
#          (X3) identity null + arm64 단독 빌드(배포 후보)가 사는지.
on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: macos-26
    steps:
      - name: 환경 확인
        run: sw_vers && uname -m

      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 의존성 설치
        run: npm ci

      - name: 테스트 함수 준비
        run: |
          cat > /tmp/run_test.sh <<'EOF'
          run_test() {
            local label="$1"; shift
            set +e
            "$@" > "/tmp/$label.log" 2>&1 &
            local pid=$!
            sleep 12
            if kill -0 "$pid" 2>/dev/null; then
              echo "RESULT [$label]: ALIVE"
              kill "$pid" 2>/dev/null; sleep 1
            else
              local code=0; wait "$pid" 2>/dev/null; code=$?
              echo "RESULT [$label]: DEAD (exit=$code)"
              tail -20 "/tmp/$label.log" 2>/dev/null
            fi
            set -e
            return 0
          }
          EOF
          echo ok

      - name: 순정 껍데기 + asar 준비
        run: |
          [ -d node_modules/electron/dist/Electron.app ] || node node_modules/electron/install.js
          mkdir -p /tmp/stage
          cp package.json /tmp/stage/
          cp -R src /tmp/stage/
          npx @electron/asar pack /tmp/stage /tmp/app.asar
          make_shell() {
            rm -rf "$1"
            cp -R node_modules/electron/dist/Electron.app "$1"
            rm -f "$1/Contents/Resources/default_app.asar"
            cp /tmp/app.asar "$1/Contents/Resources/app.asar"
          }
          make_shell /tmp/x0.app
          make_shell /tmp/x1.app
          make_shell /tmp/x2.app
          echo done

      - name: 'X0: 대조군 — 손 안 댄 껍데기 (ALIVE 재확인)'
        run: |
          source /tmp/run_test.sh
          run_test x0-pristine "/tmp/x0.app/Contents/MacOS/Electron"

      - name: 'X1: 껍데기를 plain ad-hoc으로 재서명만 함'
        run: |
          codesign --force --deep --sign - /tmp/x1.app
          codesign -dv /tmp/x1.app 2>&1 | grep -E "flags|Identifier"
          source /tmp/run_test.sh
          run_test x1-resigned "/tmp/x1.app/Contents/MacOS/Electron"

      - name: 'X2: 껍데기를 runtime+JIT 엔타이틀먼트로 재서명'
        run: |
          codesign --force --deep --options runtime --entitlements build/entitlements.mac.plist --sign - /tmp/x2.app
          codesign -dv /tmp/x2.app 2>&1 | grep -E "flags|Identifier"
          source /tmp/run_test.sh
          run_test x2-resigned-jit "/tmp/x2.app/Contents/MacOS/Electron"

      - name: 'X3: 배포 후보 — electron-builder arm64 + identity null (서명 무접촉)'
        run: |
          npx electron-builder --mac zip --arm64 --publish never -c.mac.identity=null
          ditto -x -k dist/geumoki-*-mac.zip /tmp/candidate
          codesign -dv "/tmp/candidate/금옥이.app" 2>&1 | grep -E "flags|Identifier" || true
          source /tmp/run_test.sh
          run_test x3-candidate "/tmp/candidate/금옥이.app/Contents/MacOS/금옥이"

      - name: 배포 후보 아티팩트 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: geumoki-arm64-unsigned
          path: dist/*.zip
          if-no-files-found: ignore

      - name: 크래시 리포트 요약
        if: always()
        run: |
          for f in ~/Library/Logs/DiagnosticReports/*.ips; do
            [ -e "$f" ] || continue
            echo "===== $(basename "$f") ====="
            python3 - "$f" <<'PYEOF' || true
          import json,sys
          lines=open(sys.argv[1],encoding='utf-8',errors='replace').read().splitlines()
          body=json.loads("\n".join(lines[1:]))
          th=body["threads"][body.get("faultingThread",0)]
          print("proc:",body.get("procName"),"offsets:",[fr.get("imageOffset") for fr in th["frames"][:4]])
          PYEOF
          done
