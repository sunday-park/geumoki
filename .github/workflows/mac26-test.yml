name: mac26-test

# macOS 26 (Tahoe) 진단 매트릭스 — 수동 실행 전용. 배포와 무관.
# 개발모드는 살고 universal 패키징만 죽는 것을 확인했으므로,
# arm64 단독 빌드 vs universal 빌드를 갈라 원인을 확정한다.
on:
  workflow_dispatch:
    inputs:
      artifact_run_id:
        description: '서명본 universal zip이 들어있는 build 워크플로 run id'
        required: true

jobs:
  diag:
    runs-on: macos-26
    steps:
      - name: 환경 확인
        run: sw_vers && uname -m

      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 의존성 설치
        run: npm ci

      - name: 테스트 함수 준비
        run: |
          cat > /tmp/run_test.sh <<'EOF'
          run_test() {
            local label="$1"; shift
            set +e
            "$@" > "/tmp/$label.log" 2>&1 &
            local pid=$!
            sleep 15
            if kill -0 "$pid" 2>/dev/null; then
              echo "RESULT [$label]: ALIVE (실행 성공)"
              kill "$pid" 2>/dev/null; sleep 1
            else
              local code=0; wait "$pid" 2>/dev/null; code=$?
              echo "RESULT [$label]: DEAD (exit=$code)"
              echo "--- $label log tail ---"
              tail -30 "/tmp/$label.log" 2>/dev/null
              echo "------------------------"
            fi
            set -e
            return 0
          }
          EOF
          echo ok

      - name: '테스트 A: arm64 단독 electron-builder 빌드'
        run: |
          npx electron-builder --mac zip --arm64
          ls dist/
          ditto -x -k dist/geumoki-*-mac.zip arm64-app
          codesign -dv "arm64-app/금옥이.app" 2>&1 | grep -E "Identifier|flags|Signature" || true
          source /tmp/run_test.sh
          run_test arm64-only "$PWD/arm64-app/금옥이.app/Contents/MacOS/금옥이"

      - name: '테스트 B: universal 서명본 (기존 아티팩트, 죽을 것으로 예상)'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run download "${{ inputs.artifact_run_id }}" --repo "$GITHUB_REPOSITORY" --name geumoki-macos-latest --dir fixed
          ditto -x -k fixed/geumoki-*-mac.zip fixed-app
          source /tmp/run_test.sh
          run_test universal-signed "$PWD/fixed-app/금옥이.app/Contents/MacOS/금옥이"

      - name: 'V8 스냅샷 파일 비교 (universal vs arm64 vs npm 원본)'
        if: always()
        run: |
          echo "=== universal 빌드 Framework Resources ==="
          ls -la "fixed-app/금옥이.app/Contents/Frameworks/Electron Framework.framework/Versions/A/Resources/" | grep -E "\.bin|lipo" || true
          echo "=== arm64 빌드 Framework Resources ==="
          ls -la "arm64-app/금옥이.app/Contents/Frameworks/Electron Framework.framework/Versions/A/Resources/" | grep -E "\.bin" || true
          echo "=== npm 원본(dev, arm64) ==="
          ls -la "node_modules/electron/dist/Electron.app/Contents/Frameworks/Electron Framework.framework/Versions/A/Resources/" | grep -E "\.bin" || true
          echo "=== 해시 비교 ==="
          for f in v8_context_snapshot.bin v8_context_snapshot.arm64.bin v8_context_snapshot.x86_64.bin; do
            for d in fixed-app arm64-app; do
              p="$d/금옥이.app/Contents/Frameworks/Electron Framework.framework/Versions/A/Resources/$f"
              [ -e "$p" ] && shasum -a 256 "$p"
            done
            p="node_modules/electron/dist/Electron.app/Contents/Frameworks/Electron Framework.framework/Versions/A/Resources/$f"
            [ -e "$p" ] && shasum -a 256 "$p"
          done
          true

      - name: '테스트 C: 통제군 — VS Code (Developer ID 서명 Electron 앱)'
        run: |
          curl -sL "https://update.code.visualstudio.com/latest/darwin-arm64/stable" -o /tmp/vscode.zip
          ditto -x -k /tmp/vscode.zip /tmp/vscode
          source /tmp/run_test.sh
          run_test vscode-control "/tmp/vscode/Visual Studio Code.app/Contents/MacOS/Electron"

      - name: 크래시 리포트 수집·요약
        if: always()
        run: |
          mkdir -p crash-reports
          cp ~/Library/Logs/DiagnosticReports/*.ips crash-reports/ 2>/dev/null || echo "크래시 리포트 없음"
          for f in crash-reports/*.ips; do
            [ -e "$f" ] || continue
            echo "===== $f ====="
            python3 - "$f" <<'PYEOF'
          import json,sys
          lines=open(sys.argv[1],encoding='utf-8',errors='replace').read().splitlines()
          meta=json.loads(lines[0]); body=json.loads("\n".join(lines[1:]))
          print("proc:",meta.get("app_name"),"| time:",meta.get("timestamp"))
          print("exception:",body.get("exception"))
          print("termination:",body.get("termination"))
          ft=body.get("faultingThread",0)
          th=body.get("threads",[{}])[ft]
          imgs=body.get("usedImages",[])
          for fr in th.get("frames",[])[:12]:
              idx=fr.get("imageIndex",-1)
              img=imgs[idx]["name"] if 0<=idx<len(imgs) else "?"
              print(f'  {img} + {fr.get("imageOffset")}  {fr.get("symbol","")}+{fr.get("symbolLocation","")}')
          PYEOF
          done

      - name: 크래시 리포트 아티팩트 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crash-reports
          path: crash-reports/
          if-no-files-found: ignore

      - name: arm64 빌드 아티팩트 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: geumoki-arm64-zip
          path: dist/*.zip
          if-no-files-found: ignore
