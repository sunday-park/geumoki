name: mac26-test

# macOS 26 (Tahoe) 진단 — Electron 버전 가르기. 수동 실행 전용, 배포와 무관.
# 확정: 헬퍼 앱 번들명이 "Electron Helper*"가 아니면 Electron 43.0.0 이 기동 중 죽는다.
# 이번 런: 42/41 로 빌드하면 사는지(=43 회귀 확정), 이름 이론 재확인.
on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: macos-26
    steps:
      - name: 환경 확인
        run: sw_vers && uname -m

      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 의존성 설치
        run: npm ci

      - name: 테스트 함수 준비
        run: |
          cat > /tmp/run_test.sh <<'EOF'
          run_test() {
            local label="$1"; shift
            set +e
            ELECTRON_ENABLE_LOGGING=stderr "$@" --enable-logging=stderr > "/tmp/$label.log" 2>&1 &
            local pid=$!
            sleep 12
            if kill -0 "$pid" 2>/dev/null; then
              echo "RESULT [$label]: ALIVE"
              kill "$pid" 2>/dev/null; sleep 1
            else
              local code=0; wait "$pid" 2>/dev/null; code=$?
              echo "RESULT [$label]: DEAD (exit=$code)"
              echo "--- log ---"; cat "/tmp/$label.log" 2>/dev/null; echo "--- end ---"
            fi
            set -e
            return 0
          }
          EOF
          echo ok

      - name: 'Z1: Electron 42 최신으로 빌드 → 실행'
        run: |
          npm i -D electron@42 --no-audit --no-fund
          node -e "console.log('electron', require('electron/package.json').version)"
          npx electron-builder --mac zip --arm64 --publish never -c.mac.identity=null
          rm -rf /tmp/z1 && ditto -x -k dist/geumoki-*-mac.zip /tmp/z1
          source /tmp/run_test.sh
          run_test z1-electron42 "/tmp/z1/금옥이.app/Contents/MacOS/금옥이"

      - name: 'Z2: Electron 41 최신으로 빌드 → 실행'
        run: |
          npm i -D electron@41 --no-audit --no-fund
          node -e "console.log('electron', require('electron/package.json').version)"
          rm -rf dist
          npx electron-builder --mac zip --arm64 --publish never -c.mac.identity=null
          rm -rf /tmp/z2 && ditto -x -k dist/geumoki-*-mac.zip /tmp/z2
          source /tmp/run_test.sh
          run_test z2-electron41 "/tmp/z2/금옥이.app/Contents/MacOS/금옥이"

      - name: 'Z3: Electron 43 빌드 + 순정 이름 헬퍼를 나란히 추가 (이름 이론 재확인)'
        run: |
          npm i -D electron@43 --no-audit --no-fund
          node -e "console.log('electron', require('electron/package.json').version)"
          rm -rf dist
          npx electron-builder --mac zip --arm64 --publish never -c.mac.identity=null
          rm -rf /tmp/z3 && ditto -x -k dist/geumoki-*-mac.zip /tmp/z3
          [ -d node_modules/electron/dist/Electron.app ] || node node_modules/electron/install.js
          src="node_modules/electron/dist/Electron.app/Contents/Frameworks"
          for t in "" " (GPU)" " (Renderer)" " (Plugin)"; do
            cp -R "$src/Electron Helper$t.app" "/tmp/z3/금옥이.app/Contents/Frameworks/"
          done
          source /tmp/run_test.sh
          run_test z3-both-helpers "/tmp/z3/금옥이.app/Contents/MacOS/금옥이"

      - name: 크래시 리포트 요약
        if: always()
        run: |
          for f in ~/Library/Logs/DiagnosticReports/*.ips; do
            [ -e "$f" ] || continue
            echo "===== $(basename "$f") ====="
            python3 - "$f" <<'PYEOF' || true
          import json,sys
          lines=open(sys.argv[1],encoding='utf-8',errors='replace').read().splitlines()
          body=json.loads("\n".join(lines[1:]))
          th=body["threads"][body.get("faultingThread",0)]
          print("proc:",body.get("procName"),"offsets:",[fr.get("imageOffset") for fr in th["frames"][:4]])
          PYEOF
          done

      - name: Electron 42 빌드 아티팩트 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diag-builds
          path: dist/*.zip
          if-no-files-found: ignore
