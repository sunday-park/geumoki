name: mac26-test

# macOS 26 (Tahoe) 진단 — 이분탐색 매트릭스. 수동 실행 전용, 배포와 무관.
# 확정 사실: 개발모드 ALIVE / electron-builder 패키징(arm64·universal, 서명 유무 무관) DEAD.
# 이번 런: 패키징의 어느 요소(asar, 한글 이름, Info.plist, 무결성 키)가 원인인지 가른다.
on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: macos-26
    steps:
      - name: 환경 확인
        run: sw_vers && uname -m

      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 의존성 설치
        run: npm ci

      - name: 테스트 함수 준비
        run: |
          cat > /tmp/run_test.sh <<'EOF'
          run_test() {
            local label="$1"; shift
            set +e
            "$@" > "/tmp/$label.log" 2>&1 &
            local pid=$!
            sleep 12
            if kill -0 "$pid" 2>/dev/null; then
              echo "RESULT [$label]: ALIVE"
              kill "$pid" 2>/dev/null; sleep 1
            else
              local code=0; wait "$pid" 2>/dev/null; code=$?
              echo "RESULT [$label]: DEAD (exit=$code)"
              tail -20 "/tmp/$label.log" 2>/dev/null
            fi
            set -e
            return 0
          }
          EOF
          echo ok

      - name: 베이스라인 패키징 (electron-builder arm64)
        run: |
          npx electron-builder --mac zip --arm64 --publish never
          ditto -x -k dist/geumoki-*-mac.zip pkg
          source /tmp/run_test.sh
          run_test pkg-baseline "$PWD/pkg/금옥이.app/Contents/MacOS/금옥이"

      - name: 'T1: 순정 Electron 껍데기 + 우리 앱(loose 폴더)'
        run: |
          [ -d node_modules/electron/dist/Electron.app ] || node node_modules/electron/install.js
          cp -R node_modules/electron/dist/Electron.app /tmp/shell-loose.app
          mkdir /tmp/shell-loose.app/Contents/Resources/app
          cp package.json /tmp/shell-loose.app/Contents/Resources/app/
          cp -R src /tmp/shell-loose.app/Contents/Resources/app/
          source /tmp/run_test.sh
          run_test shell-loose "/tmp/shell-loose.app/Contents/MacOS/Electron"

      - name: 'T2: 순정 껍데기 + app.asar'
        run: |
          mkdir -p /tmp/stage
          cp package.json /tmp/stage/
          cp -R src /tmp/stage/
          npx @electron/asar pack /tmp/stage /tmp/app.asar
          cp -R node_modules/electron/dist/Electron.app /tmp/shell-asar.app
          rm -rf /tmp/shell-asar.app/Contents/Resources/default_app.asar
          cp /tmp/app.asar /tmp/shell-asar.app/Contents/Resources/app.asar
          source /tmp/run_test.sh
          run_test shell-asar "/tmp/shell-asar.app/Contents/MacOS/Electron"

      - name: 'T3: 순정 껍데기+asar, 번들 폴더명만 한글(금옥이.app)'
        run: |
          cp -R /tmp/shell-asar.app "/tmp/금옥이.app"
          source /tmp/run_test.sh
          run_test shell-korean-dir "/tmp/금옥이.app/Contents/MacOS/Electron"

      - name: 'T4: 패키징본에서 무결성 키만 제거 + 재서명'
        run: |
          ditto pkg /tmp/no-integrity && cd /tmp/no-integrity
          plutil -remove ElectronAsarIntegrity "금옥이.app/Contents/Info.plist"
          codesign --force --deep --sign - "금옥이.app"
          source /tmp/run_test.sh
          run_test pkg-no-integrity "/tmp/no-integrity/금옥이.app/Contents/MacOS/금옥이"

      - name: 'T5: 패키징본 Info.plist를 순정 것으로 교체 + 실행파일명 원복 + 재서명'
        run: |
          ditto pkg /tmp/devplist && cd /tmp/devplist
          cp "$GITHUB_WORKSPACE/node_modules/electron/dist/Electron.app/Contents/Info.plist" "금옥이.app/Contents/Info.plist"
          mv "금옥이.app/Contents/MacOS/금옥이" "금옥이.app/Contents/MacOS/Electron"
          codesign --force --deep --sign - "금옥이.app"
          source /tmp/run_test.sh
          run_test pkg-devplist "/tmp/devplist/금옥이.app/Contents/MacOS/Electron"

      - name: 'T6: 패키징본 실행파일·번들명 ASCII로 변경 + 재서명'
        run: |
          ditto pkg /tmp/ascii && cd /tmp/ascii
          mv "금옥이.app" "Geumoki.app"
          mv "Geumoki.app/Contents/MacOS/금옥이" "Geumoki.app/Contents/MacOS/Geumoki"
          plutil -replace CFBundleExecutable -string "Geumoki" "Geumoki.app/Contents/Info.plist"
          plutil -replace CFBundleName -string "Geumoki" "Geumoki.app/Contents/Info.plist"
          plutil -replace CFBundleDisplayName -string "Geumoki" "Geumoki.app/Contents/Info.plist"
          codesign --force --deep --sign - "Geumoki.app"
          source /tmp/run_test.sh
          run_test pkg-ascii "/tmp/ascii/Geumoki.app/Contents/MacOS/Geumoki"

      - name: 크래시 리포트 수집(faulting thread 요약)
        if: always()
        run: |
          mkdir -p crash-reports
          cp ~/Library/Logs/DiagnosticReports/*.ips crash-reports/ 2>/dev/null || echo "크래시 리포트 없음"
          for f in crash-reports/*.ips; do
            [ -e "$f" ] || continue
            echo "===== $(basename "$f") ====="
            python3 - "$f" <<'PYEOF'
          import json,sys
          lines=open(sys.argv[1],encoding='utf-8',errors='replace').read().splitlines()
          meta=json.loads(lines[0]); body=json.loads("\n".join(lines[1:]))
          print("proc:",meta.get("app_name"))
          print("exception:",body.get("exception",{}).get("type"),body.get("termination",{}).get("indicator"))
          ft=body.get("faultingThread",0)
          th=body.get("threads",[{}])[ft]
          imgs=body.get("usedImages",[])
          for fr in th.get("frames",[])[:8]:
              idx=fr.get("imageIndex",-1)
              img=imgs[idx]["name"] if 0<=idx<len(imgs) else "?"
              print(f'  {img} +{fr.get("imageOffset")}')
          PYEOF
          done

      - name: 크래시 리포트 아티팩트 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crash-reports
          path: crash-reports/
          if-no-files-found: ignore
