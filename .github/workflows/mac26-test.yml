name: mac26-test

# macOS 26 (Tahoe) 릴리스 후보 최종 검증 — 수동 실행 전용, 배포와 무관.
# 릴리스와 동일한 명령(npm run dist:mac)으로 빌드한 산출물이 macOS 26 에서 켜지는지 확인한다.
# 근본 원인(확정): macOS 26.4 가 한글 이름 헬퍼 앱을 찾지 못해 기동 크래시 → 내부명 ASCII 로 해결.
on:
  workflow_dispatch:

jobs:
  verify-release-build:
    runs-on: macos-26
    steps:
      - name: 환경 확인
        run: sw_vers && uname -m

      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 의존성 설치
        run: npm ci

      - name: 릴리스와 동일한 빌드 (npm run dist:mac)
        run: npm run dist:mac -- --publish never

      - name: 산출물 확인
        run: |
          ls -la dist/
          ditto -x -k dist/geumoki-*-mac.zip /tmp/rel
          ls /tmp/rel
          plutil -p "/tmp/rel/Geumoki.app/Contents/Info.plist" | grep -E "CFBundleDisplayName|CFBundleName|CFBundleExecutable"
          ls "/tmp/rel/Geumoki.app/Contents/Frameworks/" | head -8
          codesign -dv "/tmp/rel/Geumoki.app" 2>&1 | grep -E "Identifier|flags"
          codesign --verify --deep --strict "/tmp/rel/Geumoki.app" && echo "서명 검증 OK"

      - name: 'zip 산출물 실행 테스트 (arm64, 15초 생존)'
        run: |
          set +e
          "/tmp/rel/Geumoki.app/Contents/MacOS/Geumoki" > /tmp/rel.log 2>&1 &
          pid=$!
          sleep 15
          if kill -0 "$pid" 2>/dev/null; then
            echo "RESULT [release-zip-arm64]: ALIVE ✅"
            kill "$pid"
          else
            wait "$pid"; code=$?
            echo "RESULT [release-zip-arm64]: DEAD (exit=$code) ❌"
            tail -20 /tmp/rel.log
            exit 1
          fi

      - name: 'dmg 산출물 실행 테스트 (마운트 후 동일 검증)'
        run: |
          hdiutil attach dist/geumoki-*-mac.dmg -nobrowse -mountpoint /Volumes/geumoki-test
          ditto "/Volumes/geumoki-test/Geumoki.app" /tmp/rel-dmg/Geumoki.app
          hdiutil detach /Volumes/geumoki-test
          set +e
          "/tmp/rel-dmg/Geumoki.app/Contents/MacOS/Geumoki" > /tmp/reldmg.log 2>&1 &
          pid=$!
          sleep 15
          if kill -0 "$pid" 2>/dev/null; then
            echo "RESULT [release-dmg-arm64]: ALIVE ✅"
            kill "$pid"
          else
            wait "$pid"; code=$?
            echo "RESULT [release-dmg-arm64]: DEAD (exit=$code) ❌"
            tail -20 /tmp/reldmg.log
            exit 1
          fi

      - name: 크래시 리포트 요약(있으면)
        if: always()
        run: |
          for f in ~/Library/Logs/DiagnosticReports/*.ips; do
            [ -e "$f" ] || continue
            echo "===== $(basename "$f") ====="
            python3 - "$f" <<'PYEOF' || true
          import json,sys
          lines=open(sys.argv[1],encoding='utf-8',errors='replace').read().splitlines()
          body=json.loads("\n".join(lines[1:]))
          th=body["threads"][body.get("faultingThread",0)]
          print("proc:",body.get("procName"),"offsets:",[fr.get("imageOffset") for fr in th["frames"][:4]])
          PYEOF
          done
