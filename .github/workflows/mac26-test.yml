name: mac26-test

# macOS 26 (Tahoe) 진단 — 최종 해결책 검증. 수동 실행 전용, 배포와 무관.
# 확정: macOS 26.4 에서 한글 이름 헬퍼(금옥이 Helper*.app)를 찾지 못해 기동 크래시.
#       "Electron Helper*.app" 폴백이 있으면 생존. Electron 41/42/43 공통.
# 이번 런: 내부 이름 ASCII(Geumoki) + 표시명 금옥이 빌드가 사는지 최종 확인.
on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: macos-26
    steps:
      - name: 환경 확인
        run: sw_vers && uname -m

      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 의존성 설치
        run: npm ci

      - name: 테스트 함수 준비
        run: |
          cat > /tmp/run_test.sh <<'EOF'
          run_test() {
            local label="$1"; shift
            set +e
            "$@" > "/tmp/$label.log" 2>&1 &
            local pid=$!
            sleep 12
            if kill -0 "$pid" 2>/dev/null; then
              echo "RESULT [$label]: ALIVE"
              kill "$pid" 2>/dev/null; sleep 1
            else
              local code=0; wait "$pid" 2>/dev/null; code=$?
              echo "RESULT [$label]: DEAD (exit=$code)"
              tail -20 "/tmp/$label.log" 2>/dev/null
            fi
            set -e
            return 0
          }
          EOF
          echo ok

      - name: 'F1: productName=Geumoki(ASCII) + 표시명 금옥이 빌드'
        run: |
          npx electron-builder --mac zip --arm64 --publish never \
            -c.mac.identity=null \
            -c.productName=Geumoki \
            "-c.mac.extendInfo.CFBundleDisplayName=금옥이" \
            -c.mac.artifactName='geumoki-${version}-mac-arm64.${ext}'
          ditto -x -k dist/geumoki-*-mac-arm64.zip /tmp/f1
          ls /tmp/f1
          source /tmp/run_test.sh
          run_test f1-ascii-internal "/tmp/f1/Geumoki.app/Contents/MacOS/Geumoki"

      - name: 'F2: F1 결과물의 겉 폴더명만 금옥이.app 으로 rename'
        run: |
          ditto /tmp/f1 /tmp/f2
          mv "/tmp/f2/Geumoki.app" "/tmp/f2/금옥이.app"
          source /tmp/run_test.sh
          run_test f2-korean-dir "/tmp/f2/금옥이.app/Contents/MacOS/Geumoki"

      - name: 'F3: 표시명 확인 (Info.plist)'
        run: |
          plutil -p "/tmp/f1/Geumoki.app/Contents/Info.plist" | grep -E "CFBundleDisplayName|CFBundleName|CFBundleExecutable"
          ls "/tmp/f1/Geumoki.app/Contents/Frameworks/" | head -8

      - name: 크래시 리포트 요약
        if: always()
        run: |
          for f in ~/Library/Logs/DiagnosticReports/*.ips; do
            [ -e "$f" ] || continue
            echo "===== $(basename "$f") ====="
            python3 - "$f" <<'PYEOF' || true
          import json,sys
          lines=open(sys.argv[1],encoding='utf-8',errors='replace').read().splitlines()
          body=json.loads("\n".join(lines[1:]))
          th=body["threads"][body.get("faultingThread",0)]
          print("proc:",body.get("procName"),"offsets:",[fr.get("imageOffset") for fr in th["frames"][:4]])
          PYEOF
          done

      - name: 빌드 아티팩트 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: geumoki-ascii-build
          path: dist/*.zip
          if-no-files-found: ignore
