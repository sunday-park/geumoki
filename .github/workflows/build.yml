name: build

# v 로 시작하는 태그(예: v1.0.2)를 push 하면 윈도우 exe + 맥 dmg/zip 을 자동 빌드해
# Releases 페이지에 올린다. 수동 실행(workflow_dispatch)도 가능 — 이때는 Actions 실행 결과물로만 받는다.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # Release 에 파일 업로드하려면 필요

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: dist:win
          - os: macos-latest
            script: dist:mac
    runs-on: ${{ matrix.os }}
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 의존성 설치
        run: npm ci

      - name: 빌드
        run: npm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 맥: 인증서 없이 ad-hoc 서명(identity "-", package.json 참조).
          # macOS 26부터 미서명 Electron 앱은 실행 즉시 크래시하므로 서명을 생략하면 안 된다.

      # 로컬 빌드는 한글명(금옥이.exe)을 쓰지만, GitHub Release 는 한글 자산명을
      # default.exe 로 바꿔버린다. CI 릴리스용으로만 ASCII 이름으로 정리한다.
      - name: 윈도우 exe 이름 정리(한글 → ASCII)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $v = (Get-Content package.json -Raw | ConvertFrom-Json).version
          Get-ChildItem dist/*.exe | ForEach-Object { Rename-Item $_.FullName "geumoki-$v-win.exe" }

      - name: 결과물 업로드(Actions 실행용)
        uses: actions/upload-artifact@v4
        with:
          name: geumoki-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
          if-no-files-found: ignore

      - name: Release 에 올리기(태그 push 시에만)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
